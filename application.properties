# Global Configuration
app.name=LOCRMS
app.version=1.0.0
app.description=Loan Origination & Credit Risk Management System

# Eureka Configuration (Common)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Logging Configuration (Common)
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.file.max-size=10MB
logging.file.max-history=10

# JPA/Hibernate (Common)
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.use_sql_comments=true

# Validation
spring.validation.enabled=true

# Application Server
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:8000,http://localhost:5000,*
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

