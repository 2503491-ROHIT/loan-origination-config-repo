# API Gateway Configuration
spring.application.name=api-gateway
server.port=9090

# Gateway Routes Configuration
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=customer-service
spring.cloud.gateway.routes[1].uri=lb://customer-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/customers/**

spring.cloud.gateway.routes[2].id=loan-service
spring.cloud.gateway.routes[2].uri=lb://loan-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/loans/**

spring.cloud.gateway.routes[3].id=credit-service
spring.cloud.gateway.routes[3].uri=lb://credit-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/credits/**

spring.cloud.gateway.routes[4].id=disbursement-service
spring.cloud.gateway.routes[4].uri=lb://disbursement-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/disbursements/**

spring.cloud.gateway.routes[5].id=collections-service
spring.cloud.gateway.routes[5].uri=lb://collections-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/collections/**

# Logging
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.file.name=logs/api-gateway.log
logging.file.max-size=10MB
logging.file.max-history=10

# Eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

