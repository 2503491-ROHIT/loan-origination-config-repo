# Disbursement Service Configuration
spring.application.name=disbursement-service
server.port=8085

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/locrms_disbursement?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Disbursement Configuration
disbursement.emi.calculation.method=REDUCING_BALANCE
disbursement.emi.rounding.mode=HALF_UP
disbursement.emi.scale=2
disbursement.overdue.days.threshold=30

# Logging
logging.level.root=INFO
logging.level.com.genc.disbursement_service=DEBUG
logging.file.name=logs/disbursement-service.log
logging.file.max-size=10MB
logging.file.max-history=10

# Eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
