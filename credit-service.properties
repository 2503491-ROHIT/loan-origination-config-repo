# Credit Service Configuration
spring.application.name=credit-service
server.port=8084

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/locrms_credit?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Credit Configuration
credit.bureau.score.min=300
credit.bureau.score.max=900
credit.internal.score.min=0
credit.internal.score.max=1000
credit.risk.grade.low.threshold=600
credit.risk.grade.high.threshold=750

# Logging
logging.level.root=INFO
logging.level.com.genc.credit_service=DEBUG
logging.file.name=logs/credit-service.log
logging.file.max-size=10MB
logging.file.max-history=10

# Eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
